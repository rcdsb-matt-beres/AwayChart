<body [ngClass]="currSeason == 'Winter' ? 'winter' : 
    currSeason == 'Spring' ? 'spring' : 
    currSeason == 'Summer' ? 'summer' : 
    currSeason == 'Halloween' ? 'halloween' : 
    currSeason == 'Remembrance' ? 'remembrance': 
    currSeason == 'Christmas' ? 'christmas': 
    currSeason == 'Valentines' ? 'valentines' : 
    currSeason == 'St. Patrick\'s Day' ? 'st-patricks-day' : 
    'fall'">
    <app-clock></app-clock>
    <app-grid></app-grid>
    <app-add-event></app-add-event>
</body>
